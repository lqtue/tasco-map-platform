proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tiles:10m max_size=2g inactive=7d;

server {
    listen 80;
    server_name tiles.tasco-internal.vn;

    # Redirect to HTTPS in production
    # return 301 https://$host$request_uri;

    # For dev/MVP, serve directly on 80
    include /etc/nginx/conf.d/locations.conf*;

    # STAC catalog — pass through to R2 or local file
    location /stac/ {
        proxy_pass http://titiler:8080/;
        # Or serve static catalog from R2:
        # proxy_pass ${R2_PUBLIC_URL}/stac/;
    }

    # Temporal tile routing: /{source}/{date}/tiles/{z}/{x}/{y}.png
    # -> TiTiler COG endpoint with the correct R2 URL
    location ~ ^/(?<source>[a-z0-9]+)/(?<date>[0-9]{4}-[0-9]{2})/tiles/(?<z>[0-9]+)/(?<x>[0-9]+)/(?<y>[0-9]+)\.png$ {
        # Build the COG URL on R2
        set $cog_url "${R2_PUBLIC_URL}/${source}/${date}/composite.tif";

        proxy_pass http://titiler:8080/cog/tiles/WebMercatorQuad/$z/$x/$y.png?url=$cog_url;

        # Cache tiles for 1 hour
        proxy_cache tiles;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$source:$date:$z:$x:$y";

        add_header X-Cache-Status $upstream_cache_status;
        add_header Access-Control-Allow-Origin "*";

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # TiTiler API passthrough (for direct COG access, info, etc.)
    location /cog/ {
        proxy_pass http://titiler:8080/cog/;
        add_header Access-Control-Allow-Origin "*";
    }

    # Health check
    location /health {
        proxy_pass http://titiler:8080/healthz;
    }
}
